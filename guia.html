<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Como usar o Journal · Zendesk CX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1B2A;--navy2:#152236;--navy3:#1E2F45;
  --green:#00C853;--green-bg:#003D1A;--green-border:#005C25;
  --amber:#FFB300;--amber-bg:#2A1F00;--amber-border:#503300;
  --coral:#FF5252;--coral-bg:#2A0A0A;
  --purple:#7C4DFF;--purple-bg:#1A0F35;--purple-border:#3D2680;
  --text:#E8EDF2;--text2:#8FA3BB;--text3:#4D6478;
  --border:#1E3148;--border2:#253D58;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
header{background:var(--navy);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hi{max-width:760px;margin:0 auto;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.lm{width:30px;height:30px;border-radius:6px;background:var(--green);display:flex;align-items:center;justify-content:center}
.lm svg{width:16px;height:16px;fill:var(--navy)}
.ln{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.ln span{color:var(--green)}
.hlinks{display:flex;align-items:center;gap:8px}
.hlink{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:5px 12px;text-decoration:none;transition:all .15s}
.hlink:hover{color:var(--green);border-color:var(--green-border)}
.hlink svg{width:12px;height:12px}
.lang-sw{display:flex;align-items:center;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.lang-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:5px 10px;background:none;border:none;cursor:pointer;color:var(--text3);transition:all .15s}
.lang-btn.active{background:var(--navy3);color:var(--green)}
.lang-sep{width:1px;background:var(--border);height:20px}
.wrap{max-width:760px;margin:0 auto;padding:2rem 1.5rem 5rem}
.hero{margin-bottom:2.5rem}
.hero-eye{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.hero-title{font-size:26px;font-weight:700;letter-spacing:-.03em;color:var(--text);margin-bottom:8px}
.hero-title span{color:var(--green)}
.hero-sub{font-size:14px;color:var(--text2);line-height:1.7}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:2rem 0 1rem;display:flex;align-items:center;gap:10px}
.sec-label::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--green);flex-shrink:0}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.steps{display:flex;flex-direction:column;gap:10px}
.step{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;display:flex;gap:1rem;align-items:flex-start}
.step-n{width:30px;height:30px;border-radius:7px;background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.step-desc{font-size:13px;color:var(--text2);line-height:1.65}
.step-tip{font-size:12px;color:var(--text3);margin-top:7px;padding:6px 10px;background:var(--navy3);border-radius:5px;border-left:2px solid var(--border2)}
.divider{height:1px;background:var(--border);margin:2rem 0}
.faq-item{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px}
.faq-q{width:100%;text-align:left;padding:.9rem 1.25rem;background:var(--navy2);border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--text);transition:background .15s}
.faq-q:hover{background:var(--navy3)}
.faq-chevron{width:16px;height:16px;stroke:var(--text3);flex-shrink:0;transition:transform .2s}
.faq-q.open .faq-chevron{transform:rotate(180deg)}
.faq-a{display:none;padding:0 1.25rem 1rem;background:var(--navy2);font-size:13px;color:var(--text2);line-height:1.7}
.faq-a.open{display:block}
.faq-a a{color:var(--green);text-decoration:none}
.faq-a a:hover{text-decoration:underline}
@media(max-width:600px){.wrap{padding:1.25rem 1rem 4rem}.hero-title{font-size:20px}}
</style>
</head>
<body>
<header>
  <div class="hi">
    <a class="logo" href="index.html">
      <div class="lm"><svg viewBox="0 0 16 16"><path d="M2 3h5v5H2zM9 3h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg></div>
      <span class="ln">Zendesk Journal<span> · CX</span></span>
    </a>
    <div class="hlinks">
      <div class="lang-sw">
        <button class="lang-btn active" id="btn-pt" onclick="setLang('pt')">PT</button>
        <div class="lang-sep"></div>
        <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
      </div>
      <a class="hlink" href="index.html">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 2L3 6l4 4"/></svg>
        Journal
      </a>
      <a class="hlink" href="dashboard.html">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="4" height="4" rx="1"/><rect x="7" y="1" width="4" height="4" rx="1"/><rect x="1" y="7" width="4" height="4" rx="1"/><rect x="7" y="7" width="4" height="4" rx="1"/></svg>
        Dashboard
      </a>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <p class="hero-eye" id="hero-eye"></p>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-sub" id="hero-sub"></p>
  </div>
  <p class="sec-label" id="label-steps"></p>
  <div class="steps" id="steps-list"></div>
  <div class="divider"></div>
  <p class="sec-label" id="label-faq"></p>
  <div id="faq-list"></div>
</div>

<script>
const I18N = {
  pt:{
    heroEye:'Guia de uso',
    heroTitle:'Como usar o Zendesk Journal',
    heroSub:'O journal reúne as novidades mensais do Zendesk filtradas para CX. Veja como funciona e o que você pode fazer.',
    labelSteps:'Como funciona',
    labelFaq:'Perguntas frequentes',
    steps:[
      {n:'1',title:'O journal é publicado toda primeira terça do mês',desc:'A IA busca as release notes oficiais do Zendesk, filtra o que é relevante para CX e publica os resumos aqui — em português e espanhol. O conteúdo já está pronto quando você chegar.',tip:'💡 Acesse journal-zendesk.vercel.app todo primeiro terça para ver as novidades do mês.'},
      {n:'2',title:'Leia os cards e explore as novidades',desc:'Cada card traz o resumo da atualização, o impacto para CX e o link para o artigo completo no Zendesk. Clique em "Oportunidades de discovery" para ver sugestões de iniciativas geradas pela IA a partir daquela novidade.',tip:''},
      {n:'3',title:'Marque o que for importante para você',desc:'Clique em "Marcar como importante" nos cards que chamaram sua atenção. Cada marcação alimenta o dashboard do analista de melhoria contínua — é assim que o time sinaliza o que considera prioritário.',tip:'💡 Não tem resposta certa — marque o que genuinamente fizer sentido para o seu dia a dia.'},
      {n:'4',title:'Sugira iniciativas',desc:'Acesse journal-zendesk.vercel.app/dashboard.html e encontre a seção "Sugestões de iniciativas". Escreva sua ideia, selecione a novidade relacionada e envie. A sugestão fica consolidada no dashboard para o analista de melhoria contínua analisar.',tip:'💡 Seja específico: em vez de "explorar o Copilot", escreva "usar o Copilot de roteamento para reduzir TMA no fluxo de cancelamento".'},
      {n:'5',title:'O analista usa o dashboard para entender prioridades',desc:'O dashboard consolida tudo que o time marcou como importante e as sugestões enviadas. O analista de melhoria contínua usa esses dados para identificar padrões, priorizar discoveries e direcionar iniciativas com base no que o time sinalizou.',tip:''},
    ],
    faq:[
      {q:'Com que frequência o journal é atualizado?',a:'Uma vez por mês, na primeira terça-feira. O conteúdo cobre as novidades do mês anterior publicadas pelo Zendesk.'},
      {q:'Preciso criar uma conta para usar?',a:'Não. O journal é público e não exige login. Basta acessar <a href="https://journal-zendesk.vercel.app">journal-zendesk.vercel.app</a>.'},
      {q:'As sugestões que envio ficam visíveis para todos?',a:'As sugestões ficam disponíveis apenas no dashboard do analista de melhoria contínua — não aparecem no journal. Acesse dashboard.html para enviá-las e visualizá-las.'},
      {q:'O que são as oportunidades de discovery?',a:'Sugestões geradas pela IA para cada novidade do Zendesk — iniciativas concretas que o time pode explorar, como testes, configurações ou experimentos relacionados àquela feature.'},
      {q:'Posso mudar o idioma?',a:'Sim. Use os botões PT / ES no canto superior direito. O site também detecta automaticamente o idioma do seu navegador.'},
      {q:'O journal cobre todas as novidades do Zendesk?',a:'Não — a IA filtra as mais relevantes para CX de um total de 20+ atualizações por mês. O foco é em IA para agentes, analytics, canais, SLA e automações.'},
      {q:'Para que serve o dashboard?',a:'É a ferramenta do analista de melhoria contínua. Mostra o que o time marcou como importante, as sugestões enviadas e gera insights com IA — para entender as prioridades do time e direcionar iniciativas.'},
    ],
  },
  es:{
    heroEye:'Guía de uso',
    heroTitle:'Cómo usar el Zendesk Journal',
    heroSub:'El journal reúne las novedades mensuales de Zendesk filtradas para CX. Ve cómo funciona y qué puedes hacer.',
    labelSteps:'Cómo funciona',
    labelFaq:'Preguntas frecuentes',
    steps:[
      {n:'1',title:'El journal se publica cada primer martes del mes',desc:'La IA busca las release notes oficiales de Zendesk, filtra lo relevante para CX y publica los resúmenes aquí — en portugués y español. El contenido ya está listo cuando llegues.',tip:'💡 Accede a journal-zendesk.vercel.app cada primer martes para ver las novedades del mes.'},
      {n:'2',title:'Lee los cards y explora las novedades',desc:'Cada card tiene el resumen de la actualización, el impacto para CX y el enlace al artículo completo en Zendesk. Haz clic en "Oportunidades de discovery" para ver sugerencias de iniciativas generadas por la IA.',tip:''},
      {n:'3',title:'Marca lo que sea importante para ti',desc:'Haz clic en "Marcar como importante" en los cards que llamaron tu atención. Cada marcación alimenta el dashboard del analista de mejora continua — así el equipo señala lo que considera prioritario.',tip:'💡 No hay respuesta correcta — marca lo que genuinamente tenga sentido para tu día a día.'},
      {n:'4',title:'Sugiere iniciativas',desc:'Accede a journal-zendesk.vercel.app/dashboard.html y encuentra la sección "Sugerencias de iniciativas". Escribe tu idea, selecciona la novedad relacionada y envíala. La sugerencia queda consolidada en el dashboard para que el analista de mejora continua la analice.',tip:'💡 Sé específico: en vez de "explorar el Copilot", escribe "usar el Copilot de enrutamiento para reducir TMA en el flujo de cancelación".'},
      {n:'5',title:'El analista usa el dashboard para entender prioridades',desc:'El dashboard consolida todo lo que el equipo marcó como importante y las sugerencias enviadas. El analista de mejora continua usa esos datos para identificar patrones, priorizar discoveries y orientar iniciativas.',tip:''},
    ],
    faq:[
      {q:'¿Con qué frecuencia se actualiza el journal?',a:'Una vez al mes, el primer martes. El contenido cubre las novedades del mes anterior publicadas por Zendesk.'},
      {q:'¿Necesito crear una cuenta?',a:'No. El journal es público y no requiere login. Solo accede a <a href="https://journal-zendesk.vercel.app">journal-zendesk.vercel.app</a>.'},
      {q:'¿Las sugerencias que envío son visibles para todos?',a:'Las sugerencias están disponibles solo en el dashboard del analista de mejora continua — no aparecen en el journal. Accede a dashboard.html para enviarlas y visualizarlas.'},
      {q:'¿Qué son las oportunidades de discovery?',a:'Sugerencias generadas por la IA para cada novedad de Zendesk — iniciativas concretas que el equipo puede explorar, como pruebas, configuraciones o experimentos.'},
      {q:'¿Puedo cambiar el idioma?',a:'Sí. Usa los botones PT / ES en la esquina superior derecha. El sitio también detecta automáticamente el idioma de tu navegador.'},
      {q:'¿El journal cubre todas las novedades de Zendesk?',a:'No — la IA filtra las más relevantes para CX de un total de 20+ actualizaciones por mes. El foco es en IA para agentes, analytics, canales, SLA y automatizaciones.'},
      {q:'¿Para qué sirve el dashboard?',a:'Es la herramienta del analista de mejora continua. Muestra lo que el equipo marcó como importante, las sugerencias enviadas y genera insights con IA — para entender las prioridades del equipo y orientar iniciativas.'},
    ],
  }
};

let lang = localStorage.getItem('zd_lang') || ((navigator.language||'pt').toLowerCase().startsWith('es')?'es':'pt');

function setLang(l){lang=l;localStorage.setItem('zd_lang',l);render();}

function render(){
  const T=I18N[lang];
  document.documentElement.lang=lang==='pt'?'pt-BR':'es';
  document.title=lang==='pt'?'Como usar o Journal · Zendesk CX':'Cómo usar el Journal · Zendesk CX';
  document.getElementById('btn-pt').classList.toggle('active',lang==='pt');
  document.getElementById('btn-es').classList.toggle('active',lang==='es');
  document.getElementById('hero-eye').textContent=T.heroEye;
  document.getElementById('hero-title').innerHTML=T.heroTitle.replace('Zendesk Journal','<span>Zendesk Journal</span>');
  document.getElementById('hero-sub').textContent=T.heroSub;
  document.getElementById('label-steps').textContent=T.labelSteps;
  document.getElementById('label-faq').textContent=T.labelFaq;
  document.getElementById('steps-list').innerHTML=T.steps.map(s=>`
    <div class="step">
      <div class="step-n">${s.n}</div>
      <div>
        <p class="step-title">${s.title}</p>
        <p class="step-desc">${s.desc}</p>
        ${s.tip?`<p class="step-tip">${s.tip}</p>`:''}
      </div>
    </div>`).join('');
  document.getElementById('faq-list').innerHTML=T.faq.map((item,i)=>`
    <div class="faq-item">
      <button class="faq-q" onclick="toggleFaq(${i},this)">
        <span>${item.q}</span>
        <svg class="faq-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
      </button>
      <div class="faq-a" id="faq-${i}">${item.a}</div>
    </div>`).join('');
}

function toggleFaq(i,btn){
  const a=document.getElementById('faq-'+i);
  btn.classList.toggle('open',a.classList.toggle('open'));
}

render();
</script>
</body>
</html>
